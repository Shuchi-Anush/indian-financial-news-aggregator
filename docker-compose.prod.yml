services:
  db:
    image: postgres:16.2-alpine3.19
    container_name: finnews-db-prod
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: financial_news
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432" # Do not expose directly to public internet
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financial_news"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finnews-backend-prod
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      - APP_ENV=production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend/streamlit
      dockerfile: Dockerfile
    container_name: finnews-frontend-prod
    restart: unless-stopped
    environment:
      - API_BASE_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: finnews-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443" # For HTTPS readiness
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data_prod:

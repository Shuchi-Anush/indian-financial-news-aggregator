name: Main CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_BUILDKIT: 1

jobs:
  backend-validation:
    name: Backend Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: financial_news_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=10s

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/financial_news_test
      APP_ENV: test
      HTTP_TIMEOUT: 5.0

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync Dependencies
        run: uv sync --frozen

      - name: Verify Lockfile Consistency
        run: uv lock --check

      - name: Run Ruff
        run: uv run ruff check src tests

      - name: Run Mypy
        run: uv run mypy src

      - name: Run Alembic Migrations
        run: uv run alembic upgrade head

      - name: Run Pytest
        run: uv run pytest -q

      - name: Compile Validation
        run: uv run python -m compileall src

      - name: Validate Docker Build
        working-directory: .
        run: docker compose build backend

  frontend-validation:
    name: Frontend Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend/web

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build Next.js
        run: npm run build
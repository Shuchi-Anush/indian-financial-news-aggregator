name: Backend CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-validation:
    name: Backend Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: financial_news_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/financial_news_test
      APP_ENV: test
      HTTP_TIMEOUT: 5.0

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync Dependencies
        run: uv sync --frozen

      - name: Verify Lockfile Consistency
        run: git diff --exit-code uv.lock

      - name: Run Ruff
        run: uv run ruff check src tests

      - name: Run Mypy
        run: uv run mypy src

      - name: Run Alembic Migrations
        run: uv run alembic upgrade head

      - name: Run Pytest
        run: uv run pytest -q

      - name: Compile Validation
        run: uv run python -m compileall src

      - name: Validate Docker Build
        run: docker compose build backend
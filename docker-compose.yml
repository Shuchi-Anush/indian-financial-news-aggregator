services:
  db:
    image: postgres:16-alpine
    container_name: finnews-db
    restart: unless-stopped
    env_file:
      - .env.docker

    environment:
      POSTGRES_DB: financial_news
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: finnews-backend
    restart: unless-stopped

    env_file:
      - .env.docker

    ports:
      - "8000:8000"

    depends_on:
      - db

volumes:
  postgres_data:
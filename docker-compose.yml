services:
  db:
    image: postgres:16-alpine
    container_name: finnews-db
    restart: unless-stopped
    env_file:
      - .env

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: finnews-backend
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "${BACKEND_PORT}:8000"

    depends_on:
      - db

volumes:
  postgres_data: